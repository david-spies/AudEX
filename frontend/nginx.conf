server {
    listen 80;
    server_name localhost;

    # 1. Serve Static Frontend Files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Essential for React Router
    }

    # 2. Proxy API requests to the Backend Container
    location /api {
        # 'backend' is the service name defined in docker-compose.yml
        proxy_pass http://backend:5000/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeouts for long-running transcriptions
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;

        # Handle large file uploads (Audio/Video)
        client_max_body_size 100M;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
